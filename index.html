<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Verificator — Unified Logistics Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>

    <style>
        :root {
            --primary: #1F618D; --primary-hover: #154360; --bg-body: #f4f6f9; --bg-card: #ffffff;
            --border-color: #e0e0e0; --text-main: #333; --text-muted: #666;
            --success: #1e8449; --error: #cb4335; --warning: #d4ac0d;
            --accent-rh: #e8f8f5; --accent-req: #fef9e7;
        }
        * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { margin: 0; padding: 40px 20px; background-color: var(--bg-body); color: var(--text-main); }
        
        .layout-wrapper { display: flex; gap: 25px; max-width: 1600px; margin: 0 auto; align-items: flex-start; flex-wrap: wrap; }
        .form-column { flex: 1 1 400px; max-width: 450px; background-color: var(--bg-card); padding: 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid var(--border-color); }
        .report-column { flex: 2 1 800px; background-color: var(--bg-card); padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid var(--border-color); display: none; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { color: var(--primary); margin: 0 0 8px 0; font-size: 22px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .header p { color: var(--text-muted); margin: 0; font-size: 13px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--text-main); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; background-color: #fafafa; }
        input:focus, select:focus { border-color: var(--primary); outline: none; background-color: #fff; }
        
        .upload-section { padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed var(--primary); }
        .upload-section.rh { background-color: var(--accent-rh); border-color: #a3e4d7; }
        .upload-section.req { background-color: var(--accent-req); border-color: #f9e79f; }
        .upload-section label { color: var(--primary); display: flex; align-items: center; gap: 5px; margin-bottom: 8px; font-size: 12px;}
        input[type="file"] { width: 100%; padding: 8px; background-color: #fff; border-radius: 6px; border: 1px solid #ccc; cursor: pointer; font-size: 12px;}

        button.btn-submit { background-color: var(--primary); color: white; border: none; padding: 15px; width: 100%; font-size: 14px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        button.btn-submit:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        button.btn-submit:disabled { background-color: #aeb6bf; cursor: not-allowed; transform: none; }

        #resultBox { margin-top: 20px; padding: 15px; border-radius: 8px; font-size: 13px; display: none; border-left: 5px solid var(--success); background-color: #e9f7ef; color: var(--success); }
        .status-error { background-color: #fadbd8; border-left: 5px solid var(--error); color: var(--error); padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 13px; display: none;}
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid white; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* TABEL STYLE */
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
        th { background-color: #f4f6f9; padding: 12px; text-align: left; font-weight: 700; color: #333; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: top; }
        tr:hover { background-color: #f9f9f9; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: 600; font-size: 11px; }
        .badge-aman { background-color: #e9f7ef; color: #1e8449; border: 1px solid #a3e4d7; }
        .badge-pangkas { background-color: #fadbd8; color: #cb4335; border: 1px solid #f5b7b1; }
        .badge-kurang { background-color: #fcf3cf; color: #d4ac0d; border: 1px solid #f9e79f; }
        .badge-alias { font-size: 10px; color: #d35400; font-weight: 700; background: #fdebd0; padding: 3px 6px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; border: 1px solid #f5cba7; }

        .btn-download { background-color: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s;}
        .btn-download:hover { background-color: #1e8449; }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <div class="form-column">
            <div class="header">
                <h2><i data-lucide="shield-check"></i> SPB Logistics Portal</h2>
                <p>Sistem Terpusat Update RH & Audit Permintaan</p>
            </div>
            <form id="auditForm">
                <div class="form-group">
                    <label>AUTH PIN</label>
                    <input type="password" id="authPin" placeholder="Masukkan PIN SPB" required>
                </div>
                <div class="form-group" style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label>Nama Kapal</label>
                        <input type="text" id="vesselName" placeholder="Contoh: LPG/C GAS LAURA" required>
                    </div>
                    <div style="flex: 1;">
                        <label>Tipe Mesin</label>
                        <select id="engineType" required>
                            <option value="ME">ME</option>
                            <option value="AE 1">AE 1</option>
                            <option value="AE 2">AE 2</option>
                            <option value="AE 3">AE 3</option>
                        </select>
                    </div>
                </div>
                <div class="upload-section rh">
                    <label><i data-lucide="clock"></i> OPSI 1: Update Jam Kerja (RH)</label>
                    <input type="file" id="rhFile" accept="application/pdf, .xlsx, .xls">
                </div>
                <div class="upload-section req">
                    <label><i data-lucide="file-text"></i> OPSI 2: Audit Permintaan (Req/PO)</label>
                    <input type="file" id="reqFile" accept="application/pdf, .xlsx, .xls">
                </div>
                <button type="submit" id="submitBtn" class="btn-submit">
                    <i data-lucide="send"></i> PROSES DATA SEKARANG
                </button>
            </form>
            <div id="resultBox"></div>
            <div id="errorBox" class="status-error"></div>
        </div>

        <div class="report-column" id="reportPanel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:2px solid #eee; padding-bottom:15px;">
                <h3 style="margin:0; color:var(--primary); display:flex; align-items:center; gap:8px;">
                    <i data-lucide="table"></i> Audit Results
                </h3>
                <div style="display: flex; gap: 10px;">
                    <button type="button" id="btnDownload" class="btn-download"><i data-lucide="download" style="width:14px;"></i> Download CSV</button>
                    <button type="button" onclick="document.getElementById('reportPanel').style.display='none'" style="background:#f4f6f9; border:1px solid #ccc; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:600; color:#555; font-size: 12px;">Tutup</button>
                </div>
            </div>
            <div class="table-responsive">
                <table id="auditTable">
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Part No. / Subsystem</th>
                            <th>SPB Appr Qty</th>
                            <th>ROB</th>
                            <th>Limit Hrs</th>
                            <th>Target Cyl (Over Limit)</th>
                            <th>AI Recommendation</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        if (typeof lucide !== 'undefined') { lucide.createIcons(); }
        const WEBHOOK_URL = "https://n8.waruna-group.co.id/webhook/277b56f1-5761-412a-9be5-86298d5aa5de";
        let currentAuditData = [];

        async function sendToN8n(payloadData, progressMessages) {
            const btn = document.getElementById('submitBtn');
            let step = 0;
            btn.innerHTML = `<div class="loader"></div> ${progressMessages[step]}`;
            
            let progressInterval = setInterval(() => {
                step++;
                if (step < progressMessages.length) {
                    btn.innerHTML = `<div class="loader"></div> ${progressMessages[step]}`;
                } else {
                    clearInterval(progressInterval);
                }
            }, 3500);

            try {
                let response = await fetch(WEBHOOK_URL, { method: 'POST', body: payloadData });
                if (!response.ok) throw new Error("Koneksi ditolak oleh Server n8n.");
                return await response.json();
            } finally {
                clearInterval(progressInterval); 
            }
        }

        document.getElementById('auditForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const resultBox = document.getElementById('resultBox');
            const errorBox = document.getElementById('errorBox');
            const reportPanel = document.getElementById('reportPanel');
            const tableBody = document.getElementById('tableBody');

            const rhFile = document.getElementById('rhFile').files[0];
            const reqFile = document.getElementById('reqFile').files[0];
            
            if (!rhFile && !reqFile) {
                errorBox.style.display = 'block'; errorBox.innerHTML = `Mohon unggah minimal 1 dokumen.`; return;
            }

            resultBox.style.display = 'none'; errorBox.style.display = 'none'; reportPanel.style.display = 'none'; tableBody.innerHTML = '';
            btn.disabled = true;

            const baseFormData = new FormData();
            baseFormData.append('auth_pin', document.getElementById('authPin').value);
            baseFormData.append('vessel_name', document.getElementById('vesselName').value.toUpperCase());
            baseFormData.append('engine_type', document.getElementById('engineType').value);
            baseFormData.append('job_id', `JOB-${Date.now()}`);

            try {
                let finalData = null;
                const rhMsgs = ["[1/2] Updating RH Database...", "[1/2] Extracting Excel data...", "[1/2] Syncing with Sheets..."];
                const comboReqMsgs = ["[2/2] Analyzing Requisition...", "[2/2] AI Cross-checking RH...", "[2/2] Applying SOP Rules..."];

                if (rhFile && reqFile) {
                    let formRH = new FormData();
                    for (let pair of baseFormData.entries()) formRH.append(pair[0], pair[1]);
                    formRH.append('RH_Report', rhFile);
                    await sendToN8n(formRH, rhMsgs);

                    let formReq = new FormData();
                    for (let pair of baseFormData.entries()) formReq.append(pair[0], pair[1]);
                    formReq.append('Requisition_Report', reqFile);
                    finalData = await sendToN8n(formReq, comboReqMsgs);
                } 
                else if (rhFile) {
                    let formRH = new FormData();
                    for (let pair of baseFormData.entries()) formRH.append(pair[0], pair[1]);
                    formRH.append('RH_Report', rhFile);
                    finalData = await sendToN8n(formRH, ["Updating RH Data...", "Processing file..."]);
                }
                else {
                    let formReq = new FormData();
                    for (let pair of baseFormData.entries()) formReq.append(pair[0], pair[1]);
                    formReq.append('Requisition_Report', reqFile);
                    finalData = await sendToN8n(formReq, ["AI Analyzing Requisition...", "Matching with Mandatory...", "Calculating limits..."]);
                }

                if (finalData && finalData.status === "success") {
                    resultBox.style.display = 'block';
                    resultBox.innerHTML = `<strong>Success!</strong><br>${finalData.message}`;
                    
                    if (finalData.audit_data && Array.isArray(finalData.audit_data)) {
                        currentAuditData = finalData.audit_data;
                        finalData.audit_data.forEach(item => {
                            
                            // 1. RENDER ITEM NAME + SEQUENCE NUMBER
                            let itemNameHtml = `
                                <td style="max-width: 150px; overflow: hidden; text-overflow: ellipsis;" title="${item.Nama_Barang}">
                                    <span style="color: #7f8c8d; font-size: 10px; font-weight: bold;">#${item.No_Item_PDF || "-"}</span><br>
                                    ${item.Nama_Barang}
                                </td>`;
                            if (item.Tipe_Match === "ALIAS") {
                                itemNameHtml = `
                                <td style="max-width: 150px; overflow: hidden; text-overflow: ellipsis;" title="${item.Nama_Barang}">
                                    <span style="color: #7f8c8d; font-size: 10px; font-weight: bold;">#${item.No_Item_PDF || "-"}</span><br>
                                    ${item.Nama_Barang}<br>
                                    <span class="badge-alias"><i data-lucide="link" style="width:10px;height:10px;"></i> MAPPED: ${item.Nama_Master}</span>
                                </td>`;
                            }

                            // 2. RENDER AI RECOMMENDATION LOGIC
                            let aiRecHtml = "";
                            if (item.AI_Status === "NON-CRITICAL") {
                                aiRecHtml = `<span style="color:#7f8c8d; font-size: 11px; font-weight:600;">- NON CRITICAL -</span>`;
                            } else {
                                let statusClass = "badge-aman";
                                if (item.AI_Status === "REDUCED") statusClass = "badge-pangkas";
                                else if (item.AI_Status === "UNDER-ORDER") statusClass = "badge-kurang";

                                let warningHtml = item.Warning_Text ? `<div style="color:#c0392b; font-weight:bold; font-size:10px; margin-bottom:4px;">${item.Warning_Text}</div>` : "";
                                let bulletPoints = item.Rekomendasi_AI.split("|").map(b => `<li style="margin-bottom:3px;">${b.trim()}</li>`).join("");
                                
                                aiRecHtml = `
                                    ${warningHtml}
                                    <span class="badge ${statusClass}" style="margin-bottom:8px; display:inline-block;">${item.AI_Status}</span>
                                    <ul style="margin: 0; padding-left: 15px; font-size: 11px; color: #444;">
                                        ${bulletPoints}
                                    </ul>
                                `;
                            }

                            // 3. RENDER TABLE ROW
                            let tr = document.createElement('tr');
                            tr.innerHTML = `
                                ${itemNameHtml}
                                <td>${item.No_Part}<br><span style="font-size: 10px; color: #7f8c8d;">${item.Subsystem || "-"}</span></td>
                                <td><strong>${item.Qty_Diminta}</strong></td>
                                <td>${item.ROB}</td>
                                <td>${item.Max_Limit_Jam}</td>
                                <td><span style="color: #c0392b; font-weight: 600;">${item.Target_Cylinder}</span></td>
                                <td>${aiRecHtml}</td>
                            `;
                            tableBody.appendChild(tr);
                        });
                        reportPanel.style.display = 'block';
                    }
                }
            } catch (error) {
                errorBox.style.display = 'block'; errorBox.innerHTML = error.message;
            } finally {
                btn.disabled = false; btn.innerHTML = '<i data-lucide="send"></i> PROSES DATA SEKARANG';
                if (typeof lucide !== 'undefined') { lucide.createIcons(); }
            }
        });

        document.getElementById('btnDownload').addEventListener('click', function() {
            if (currentAuditData.length === 0) return;
            let csvContent = "data:text/csv;charset=utf-8,";
            let headers = Object.keys(currentAuditData[0]).join(",");
            csvContent += headers + "\r\n";
            currentAuditData.forEach(function(rowObj) {
                let row = Object.values(rowObj).map(val => `"${String(val).replace(/"/g, '""')}"`).join(",");
                csvContent += row + "\r\n";
            });
            let link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `Audit_Report_${new Date().getTime()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
